name: Build multi-platform binaries

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows-x64
            python: '3.11'
            node: '20'
            dist_dir: dist/windows
            artifact_path: dist/windows/ZPLConverter
          - os: macos-13
            label: macos-intel
            python: '3.11'
            node: '20'
            dist_dir: dist/macos-x86_64
            artifact_path: dist/macos-x86_64/ZPLConverter
            target_arch: x86_64
          - os: macos-14
            label: macos-apple-silicon
            python: '3.11'
            node: '20'
            dist_dir: dist/macos-arm64
            artifact_path: dist/macos-arm64/ZPLConverter
            target_arch: arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Install Node dependencies
        working-directory: renderer
        run: npm ci

      - name: Build on Windows
        if: runner.os == 'Windows'
        run: |
          python -m PyInstaller --noconfirm --clean --distpath "${{ matrix.dist_dir }}" --workpath build/tmp/win pyinstaller/main.spec

      - name: Build on macOS
        if: runner.os == 'macOS'
        env:
          PYINSTALLER_TARGET_ARCH: ${{ matrix.target_arch }}
        run: |
          python -m PyInstaller --noconfirm --clean --distpath "${{ matrix.dist_dir }}" --workpath build/tmp/macos pyinstaller/main.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: ${{ matrix.artifact_path }}
